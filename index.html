<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lulu Doces</title>
<link rel="icon" href="logo2.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@700&display=swap" rel="stylesheet" />
</head>
<body>


<header>
    <img src="logo2.png" alt="Logo Lulu Doces" class="logo">
</header>


<section class="foto-texto">
    <img src="fotopage1.jpeg" alt="Bolo" class="foto">
    <div class="texto">
        <h1>“Por uma vida mais doce. Há mais de 5 anos transformando cada bolo e doce em momentos inesquecíveis.”</h1>
    </div>
</section>


<section class="botoes">
    <h2>Acesse Nosso Cardápio</h2>
    <a href="pagcardapio.html" target="_blank">
        <button class="cardapio">Clique aqui</button>
    </a>
</section>


<section class="botoes">
    <h2>Dúvidas ou encomendas pelo WhatsApp:</h2>
    <a href="https://wa.me/5581984162280" target="_blank">
        <button class="whatsapp">Whatsapp</button>
    </a>
</section>



<style>

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #fdf4ed;
    color: #333;
}


header {
    background: #fdf4ed;
    text-align: center;
    padding: 30px;
}

header .logo {
    width: 300px;
    height: auto;
    border-radius: 15px;
}


.foto-texto {
    display: flex;
    flex-wrap: wrap;               
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px;
    text-align: left;
}

.foto-texto img.foto {
    width: 420px;
    max-width: 100%;
    height: auto;
    border-radius: 15px;
}

.foto-texto .texto h1 {
    font-family:'Lato', sans-serif;
    color: #aa6b69;
    font-size: 24px;
    margin: 0;
}


.botoes {
    text-align: center;
    padding: 30px;
}

.botoes h2 {
    font-family:'Lato', sans-serif;
    color: #aa6b69;
    font-size: 22px;
    margin-bottom: 20px;
}

button {
    font-family: 'Lato', sans-serif;
    border: none;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button.cardapio {
    background: #0a7cff;
    color: #fff;
}

button.cardapio:hover {
    background: #0663cc;
}

button.whatsapp {
    background: #25D366;
    color: #fff;
}

button.whatsapp:hover {
    background-color: #1ebe5d;
}


@media (max-width: 800px) {
    .foto-texto {
        flex-direction: column;
        text-align: center;
    }

    .foto-texto .texto h1 {
        font-size: 20px;
    }
}
</style>

</body>
</html>
