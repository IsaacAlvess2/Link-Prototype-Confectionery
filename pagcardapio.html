        .gallery {
            display: grid;

            padding: 20px;
        }

        .photo {
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .photo img {

        }

        .photo:hover {
